<html lang="en">

    <style>
        :root {
            --bg-main: #0b0b0d;       /* Deep Sleek Black */
            --bg-card: #16161a;       /* Dark Gray Card */
            --accent-blue: #2563eb;   /* Main Blue Buttons */
            --light-blue: #3b82f6;    /* Electric Blue Headlines */
            --border-slate: #27272a;  /* Toned-down Slate Gray Outline */
            --text-white: #ffffff;    /* Pure White */
            --text-muted: #94a3b8;    /* Soft Gray */
            
            /* Dynamic Status Highlights */
            --success-green: #22c55e; 
            --success-bg: rgba(34, 197, 94, 0.12);
            --cutoff-line: #ef4444;   /* Red for wildcard cutoff */
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-white);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        
        .container {
            width: 100%;
            max-width: 1000px;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }
        
        .header-main h1 {
            text-align: center;
            color: var(--light-blue);
            margin-bottom: 5px;
            font-size: 2.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Slider Control Panel */
        .slider-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--bg-card);
            padding: 15px 25px;
            border-radius: 12px;
            border: 1px solid var(--border-slate);
        }
        
        .stage-title {
            font-size: 22px;
            font-weight: 800;
            color: var(--light-blue);
            margin: 0;
            text-transform: uppercase;
        }
        
        .btn {
            background-color: var(--accent-blue);
            color: var(--text-white);
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .btn:disabled {
            background-color: #1f1f23;
            color: #52525b;
            border: 1px solid var(--border-slate);
            cursor: not-allowed;
        }
        
        .btn:not(:disabled):hover {
            background-color: #1d4ed8;
            box-shadow: 0 0 10px rgba(37, 99, 235, 0.4);
        }

        /* UI Legend Panel */
        .legend-panel {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 15px 20px;
            border: 1px solid var(--border-slate);
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
            align-items: center;
            font-size: 14px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .legend-box-green {
            width: 16px;
            height: 16px;
            background-color: var(--success-bg);
            border: 1px solid var(--success-green);
            border-radius: 4px;
        }

        /* Layout Grid for Tables */
        .tables-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(450px, 1fr));
            gap: 20px;
        }

        .standings-panel {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid var(--border-slate);
        }

        .standings-panel h3 {
            margin-top: 0;
            margin-bottom: 15px;
            color: var(--light-blue);
            text-transform: uppercase;
            font-size: 15px;
            letter-spacing: 1px;
        }

        .standings-table {
            width: 100%;
            border-collapse: collapse;
        }

        .standings-table th, .standings-table td {
            padding: 10px 12px;
            text-align: left;
        }

        .standings-table th {
            color: var(--text-muted);
            font-size: 11px;
            text-transform: uppercase;
            border-bottom: 1px solid var(--border-slate);
        }

        .standings-table td {
            border-bottom: 1px solid #1c1c21;
        }

        /* Wildcard Specific Styles */
        .cutoff-row td {
            border-bottom: 2px dashed var(--cutoff-line) !important;
        }

        .wildcard-score {
            font-size: 12px;
            background: rgba(59, 130, 246, 0.2);
            color: #93c5fd;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: bold;
        }

        /* Picks Display Section */
        .picks-section h3 {
            color: var(--text-muted);
            text-transform: uppercase;
            font-size: 15px;
            letter-spacing: 1px;
            margin-bottom: 15px;
        }

        .picks-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
        }
        
        .player-card {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid var(--border-slate);
        }
        
        .player-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-slate);
            padding-bottom: 8px;
            margin-bottom: 12px;
        }

        .player-name {
            color: var(--light-blue);
            font-size: 18px;
            font-weight: 700;
            margin: 0;
        }
        
        .pick-row {
            margin: 6px 0;
            padding: 6px 10px;
            border-radius: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
            border: 1px solid transparent;
        }

        .pick-team-container {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .pos-num {
            color: var(--text-muted);
            font-weight: bold;
            margin-right: 8px;
        }

        /* Dynamic Highlighting Rules */
        .match-correct-advance {
            background-color: var(--success-bg);
            border: 1px solid var(--success-green);
            color: var(--success-green);
            font-weight: bold;
        }
    </style>
</head>

    /* =========================================================================
      3. ENGINE LOGIC FOR ACTIVE STANDINGS & GLOBAL WILD CARDS
      =========================================================================
    */
    function getGlobalThirdPlaceTeams() {
        let thirdPlaceTeams = [];
        
        stages.forEach(stageName => {
            let teams = [...realTimeStandings[stageName]];
            // Sort to find 3rd place accurately
            teams.sort((a, b) => b.pts - a.pts || b.gd - a.gd);
            
            if(teams[2]) {
                thirdPlaceTeams.push({
                    team: teams[2].team,
                    nameKey: teams[2].nameKey,
                    pts: teams[2].pts,
                    gd: teams[2].gd,
                    group: stageName.replace("Group ", "")
                });
            }
        });

        // Sort all 12 third-place teams against each other
        thirdPlaceTeams.sort((a, b) => b.pts - a.pts || b.gd - a.gd);
        return thirdPlaceTeams;
    }

    function renderActiveStage() {
        const stage = stages[currentStageIndex];
        document.getElementById("currentStage").textContent = stage;
        document.getElementById("prevBtn").disabled = (currentStageIndex === 0);
        document.getElementById("nextBtn").disabled = (currentStageIndex === stages.length - 1);

        const standingsBody = document.getElementById("standingsBody");
        const wildcardStandingsBody = document.getElementById("wildcardStandingsBody");
        const grid = document.getElementById("picksGrid");
        
        grid.innerHTML = "";
        standingsBody.innerHTML = "";
        wildcardStandingsBody.innerHTML = "";

        document.getElementById("standingsTitle").textContent = `Live ${stage} Standings`;

        // 1. Render Current Slider Group Standings Table
        let groupTeams = [...(realTimeStandings[stage] || [])];
        groupTeams.sort((a, b) => b.pts - a.pts || b.gd - a.gd);

        groupTeams.forEach((team, idx) => {
            standingsBody.innerHTML += `
                <tr>
                    <td><strong>${idx + 1}</strong></td>
                    <td>${team.team}</td>
                    <td style="text-align: center;">${team.gd > 0 ? '+' + team.gd : team.gd}</td>
                    <td style="text-align: center;"><strong>${team.pts}</strong></td>
                </tr>`;
        });

        const keyAt1 = groupTeams[0] ? groupTeams[0].nameKey : "";
        const keyAt2 = groupTeams[1] ? groupTeams[1].nameKey : "";
        const keyAt3 = groupTeams[2] ? groupTeams[2].nameKey : "";
        const keyAt4 = groupTeams[3] ? groupTeams[3].nameKey : "";

        // 2. Fetch and Render the 3rd-Place Wildcard Table
        const globalThirds = getGlobalThirdPlaceTeams();
        
        // Grab the 3-letter codes of the top 8 teams currently advancing on wildcards
        const advancingWildcardCodes = globalThirds.slice(0, 8).map(t => codeMapping[t.nameKey]);

        globalThirds.forEach((team, idx) => {
            let rowClass = (idx === 7) ? 'class="cutoff-row"' : ''; // Line style after top 8
            wildcardStandingsBody.innerHTML += `
                <tr ${rowClass}>
                    <td><strong>${idx + 1}</strong></td>
                    <td>${team.team} (${team.group})</td>
                    <td style="text-align: center;">${team.gd > 0 ? '+' + team.gd : team.gd}</td>
                    <td style="text-align: center;"><strong>${team.pts}</strong></td>
                </tr>`;
        });

        // 3. Render Player Matrix Cards & Process live counters
        participants.forEach(player => {
            const pk = player.picks[stage] || ["N/A", "N/A", "N/A", "N/A"];

            const isP1Correct = (pk[0] === keyAt1 && keyAt1 !== "");
            const isP2Correct = (pk[1] === keyAt2 && keyAt2 !== "");
            const isP3Correct = (pk[2] === keyAt3 && keyAt3 !== "");
            const isP4Correct = (pk[3] === keyAt4 && keyAt4 !== "");

            const thirdPlaceCode = codeMapping[pk[2]] || "";
            const hasStar = player.wildcards.includes(thirdPlaceCode);

            const displayTeam1 = flagMapping[pk[0]] || pk[0];
            const displayTeam2 = flagMapping[pk[1]] || pk[1];
            const displayTeam3 = flagMapping[pk[2]] || pk[2];
            const displayTeam4 = flagMapping[pk[3]] || pk[3];

            // Calculate overall accurate active wildcard predictions for this user across all groups
            let accurateWildcardCount = 0;
            player.wildcards.forEach(code => {
                if (advancingWildcardCodes.includes(code)) {
                    accurateWildcardCount++;
                }
            });

            grid.innerHTML += `
                <div class="player-card">
                    <div class="player-header">
                        <h3 class="player-name">👤 ${player.name}</h3>
                        <span class="wildcard-score" title="How many of their wildcard teams are currently qualifying in the top 8 slots">${accurateWildcardCount} Wildcards Green</span>
                    </div>
                    <div class="pick-row ${isP1Correct ? 'match-correct-advance' : ''}">
                        <span class="pos-num">1st</span> 
                        <div class="pick-team-container"><span>${displayTeam1}</span></div>
                    </div>
                    <div class="pick-row ${isP2Correct ? 'match-correct-advance' : ''}">
                        <span class="pos-num">2nd</span> 
                        <div class="pick-team-container"><span>${displayTeam2}</span></div>
                    </div>
                    <div class="pick-row ${isP3Correct ? 'match-correct-advance' : ''}">
                        <span class="pos-num">3rd</span> 
                        <div class="pick-team-container">
                            <span>${displayTeam3}</span> 
                            ${hasStar ? '<span>⭐️</span>' : ''}
                        </div>
                    </div>
                    <div class="pick-row ${isP4Correct ? 'match-correct-advance' : ''}">
                        <span class="pos-num">4th</span> 
                        <div class="pick-team-container"><span>${displayTeam4}</span></div>
                    </div>
                </div>`;
        });
    }

    function changeStage(direction) {
        currentStageIndex += direction;
        renderActiveStage();
    }

    renderActiveStage();
