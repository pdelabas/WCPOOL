<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 World Cup Pool Tracker</title>
    <style>
        :root {
            --bg-main: #0f0f12;       /* Sleek Black */
            --bg-card: #16161a;       /* Dark Gray Card */
            --accent-blue: #2563eb;   /* Main Blue */
            --light-blue: #3b82f6;    /* Electric Blue */
            --outline-red: #ef4444;   /* Box Outline Red */
            --text-white: #ffffff;    /* Pure White */
            --text-muted: #94a3b8;    /* Soft Gray */
            --success-green: #22c55e; /* Vibrant Green for correct picks */
            --success-bg: rgba(34, 197, 94, 0.15);
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-white);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        
        .container {
            width: 100%;
            max-width: 1200px;
            display: grid;
            grid-template-columns: 1fr;
            gap: 25px;
        }

        @media (min-width: 850px) {
            .container {
                grid-template-columns: 320px 1fr;
            }
            .header-main {
                grid-column: span 2;
            }
        }
        
        .header-main h1 {
            text-align: center;
            color: var(--light-blue);
            margin-bottom: 10px;
            font-size: 2.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Leaderboard Panel */
        .leaderboard-card {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 20px;
            border: 2px solid var(--outline-red);
            height: fit-content;
        }

        .leaderboard-title {
            color: var(--light-blue);
            font-size: 20px;
            margin-top: 0;
            margin-bottom: 15px;
            text-transform: uppercase;
            border-bottom: 2px solid #27272a;
            padding-bottom: 8px;
            text-align: center;
        }

        .leaderboard-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 5px;
            border-bottom: 1px solid #27272a;
        }

        .rank-badge {
            background: #27272a;
            color: var(--text-white);
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
            margin-right: 10px;
        }

        .leaderboard-row.rank-0 .rank-badge { background: #eab308; color: #000; } 
        .leaderboard-row.rank-1 .rank-badge { background: #cbd5e1; color: #000; } 
        
        .player-points {
            font-weight: bold;
            color: var(--light-blue);
        }
        
        /* Main Workspace Panels */
        .main-panel {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .slider-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--bg-card);
            padding: 15px 25px;
            border-radius: 12px;
            border: 2px solid var(--outline-red);
        }
        
        .stage-title {
            font-size: 22px;
            font-weight: 800;
            color: var(--light-blue);
            margin: 0;
            text-transform: uppercase;
        }
        
        .btn {
            background-color: var(--accent-blue);
            color: var(--text-white);
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .btn:disabled {
            background-color: #27272a;
            color: #71717a;
            border: 1px solid #3f3f46;
            cursor: not-allowed;
        }
        
        .btn:not(:disabled):hover {
            background-color: #1d4ed8;
            box-shadow: 0 0 10px rgba(37, 99, 235, 0.5);
        }

        /* Real Standings Table Style */
        .standings-panel {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 20px;
            border: 2px solid var(--accent-blue);
        }

        .standings-panel h3 {
            margin-top: 0;
            margin-bottom: 15px;
            color: var(--light-blue);
            text-transform: uppercase;
            font-size: 16px;
            letter-spacing: 1px;
        }

        .standings-table {
            width: 100%;
            border-collapse: collapse;
        }

        .standings-table th, .standings-table td {
            padding: 8px 12px;
            text-align: left;
        }

        .standings-table th {
            color: var(--text-muted);
            font-size: 12px;
            text-transform: uppercase;
            border-bottom: 1px solid #27272a;
        }

        .standings-table td {
            border-bottom: 1px solid #1f1f23;
        }

        /* Picks Display Section */
        .picks-section h3 {
            color: var(--outline-red);
            text-transform: uppercase;
            font-size: 16px;
            letter-spacing: 1px;
            margin-bottom: 15px;
        }

        .picks-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
        }
        
        .player-card {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 20px;
            border: 2px solid var(--outline-red);
        }
        
        .player-name {
            color: var(--light-blue);
            font-size: 18px;
            font-weight: 700;
            margin-top: 0;
            margin-bottom: 12px;
            border-bottom: 1px solid #27272a;
            padding-bottom: 8px;
        }
        
        .pick-row {
            margin: 6px 0;
            padding: 6px 8px;
            border-radius: 6px;
            display: flex;
            justify-content: space-between;
        }

        /* The Highlight Classes */
        .match-highlight {
            background-color: var(--success-bg);
            border: 1px solid var(--success-green);
            color: var(--success-green);
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-main">
        <h1>🏆 World Cup Pool Tracker</h1>
    </div>

    <!-- Live Standings Sidebar -->
    <div class="leaderboard-card">
        <h2 class="leaderboard-title">📊 Pool Leaderboard</h2>
        <div id="leaderboardList"></div>
    </div>

    <!-- Main Workspace -->
    <div class="main-panel">
        <!-- Next/Prev Controls -->
        <div class="slider-controls">
            <button id="prevBtn" class="btn" onclick="changeStage(-1)">← Prev</button>
            <h2 id="currentStage" class="stage-title">Group A</h2>
            <button id="nextBtn" class="btn" onclick="changeStage(1)">Next →</button>
        </div>

        <!-- Real Group Standings (Changes with Slide) -->
        <div id="standingsContainer" class="standings-panel">
            <h3 id="standingsTitle">Live Group Standings</h3>
            <table class="standings-table">
                <thead>
                    <tr>
                        <th style="width: 50px;">Pos</th>
                        <th>Team</th>
                        <th style="text-align: center; width: 60px;">GD</th>
                        <th style="text-align: center; width: 60px;">PTS</th>
                    </tr>
                </thead>
                <tbody id="standingsBody"></tbody>
            </table>
        </div>

        <!-- Player Picks Container -->
        <div class="picks-section">
            <h3>👥 Player Predictions</h3>
            <div id="picksGrid" class="picks-grid"></div>
        </div>
    </div>
</div>

<script>
    const stages = ["Group A", "Group B", "Group C", "Knockouts"];
    let currentStageIndex = 0;

    /* 
      =========================================
      1. REAL TIME TOURNAMENT DATA
      =========================================
      Matches Inputted:
      - Mexico 2 - 0 South Africa
      - South Korea 2 - 1 Czechia
    */
    const realTimeStandings = {
        "Group A": [
            { team: "Mexico", pts: 3, gd: 2 },
            { team: "Canada", pts: 0, gd: 0 },
            { team: "Switzerland", pts: 0, gd: 0 },
            { team: "South Africa", pts: 0, gd: -2 }
        ],
        "Group B": [
            { team: "South Korea", pts: 3, gd: 1 },
            { team: "Germany", pts: 0, gd: 0 },
            { team: "USA", pts: 0, gd: 0 },
            { team: "Czechia", pts: 0, gd: -1 }
        ],
        "Group C": [
            { team: "Brazil", pts: 0, gd: 0 },
            { team: "Morocco", pts: 0, gd: 0 },
            { team: "Scotland", pts: 0, gd: 0 },
            { team: "Poland", pts: 0, gd: 0 }
        ]
    };

    /* 
      =========================================
      2. MOCK POOL PARTICIPANTS & BALLOTS
      =========================================
    */
    const participants = [
        {
            name: "Alex",
            points: 5,
            picks: {
                "Group A": { first: "Mexico", second: "Canada" },
                "Group B": { first: "Germany", second: "USA" },
                "Group C": { first: "Brazil", second: "Morocco" },
                "Knockouts": "🏆 Champ: France"
            }
        },
        {
            name: "Jordan",
            points: 3,
            picks: {
                "Group A": { first: "Canada", second: "Mexico" },
                "Group B": { first: "Germany", second: "South Korea" },
                "Group C": { first: "Morocco", second: "Brazil" },
                "Knockouts": "🏆 Champ: Argentina"
            }
        },
        {
            name: "Taylor",
            points: 0,
            picks: {
                "Group A": { first: "Switzerland", second: "South Africa" },
                "Group B": { first: "South Korea", second: "Germany" },
                "Group C": { first: "Poland", second: "Scotland" },
                "Knockouts": "🏆 Champ: Brazil"
            }
        }
    ];

    function renderLeaderboard() {
        const list = document.getElementById("leaderboardList");
        list.innerHTML = "";
        const sorted = [...participants].sort((a, b) => b.points - a.points);
        sorted.forEach((player, idx) => {
            list.innerHTML += `
                <div class="leaderboard-row rank-${idx}">
                    <div><span class="rank-badge">#${idx+1}</span>${player.name}</div>
                    <span class="player-points">${player.points} pts</span>
                </div>`;
        });
    }

    function renderActiveStage() {
        const stage = stages[currentStageIndex];
        document.getElementById("currentStage").textContent = stage;
        document.getElementById("prevBtn").disabled = (currentStageIndex === 0);
        document.getElementById("nextBtn").disabled = (currentStageIndex === stages.length - 1);

        const standingsBody = document.getElementById("standingsBody");
        const standingsContainer = document.getElementById("standingsContainer");
        const grid = document.getElementById("picksGrid");
        
        grid.innerHTML = "";
        standingsBody.innerHTML = "";

        if (stage === "Knockouts") {
            standingsContainer.style.display = "none";
            participants.forEach(p => {
                grid.innerHTML += `
                    <div class="player-card">
                        <h3 class="player-name">👤 ${p.name}</h3>
                        <div class="pick-row">${p.picks[stage]}</div>
                    </div>`;
            });
            return;
        }

        standingsContainer.style.display = "block";
        document.getElementById("standingsTitle").textContent = `Live ${stage} Standings`;

        let groupTeams = [...(realTimeStandings[stage] || [])];
        groupTeams.sort((a, b) => b.pts - a.pts || b.gd - a.gd);

        groupTeams.forEach((team, idx) => {
            standingsBody.innerHTML += `
                <tr>
                    <td><strong>${idx + 1}</strong></td>
                    <td>${team.team}</td>
                    <td style="text-align: center;">${team.gd > 0 ? '+' + team.gd : team.gd}</td>
                    <td style="text-align: center;"><strong>${team.pts}</strong></td>
                </tr>`;
        });

        const realFirstPlaceTeam = groupTeams[0] ? groupTeams[0].team : "";
        const realSecondPlaceTeam = groupTeams[1] ? groupTeams[1].team : "";

        participants.forEach(player => {
            const playerGroupPicks = player.picks[stage] || { first: "N/A", second: "N/A" };
            const cleanPick1 = playerGroupPicks.first;
            const cleanPick2 = playerGroupPicks.second;

            const isFirstCorrect = (cleanPick1 === realFirstPlaceTeam && realFirstPlaceTeam !== "");
            const isSecondCorrect = (cleanPick2 === realSecondPlaceTeam && realSecondPlaceTeam !== "");

            grid.innerHTML += `
                <div class="player-card">
                    <h3 class="player-name">👤 ${player.name}</h3>
                    <div class="pick-row ${isFirstCorrect ? 'match-highlight' : ''}">
                        <span>1st Place:</span> <span>${cleanPick1}</span>
                    </div>
                    <div class="pick-row ${isSecondCorrect ? 'match-highlight' : ''}">
                        <span>2nd Place:</span> <span>${cleanPick2}</span>
                    </div>
                </div>`;
        });
    }

    function changeStage(direction) {
        currentStageIndex += direction;
        renderActiveStage();
    }

    renderLeaderboard();
    renderActiveStage();
</script>

</body>
</html>
